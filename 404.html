<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Kids FunZone</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100" style="background: radial-gradient(circle, var(--background-alt) 0%, var(--background) 100%);">

    <div class="container text-center py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <!-- Playful emoticon/icon -->
                <div class="display-1 text-primary fw-bold mb-4 font-heading" style="font-size: 8rem;">
                    4<i class="bi bi-exclamation-circle text-secondary"></i>4
                </div>
                <h2 class="fw-bold font-heading mb-3">Oops! Game Over for this Link!</h2>
                <p class="lead text-gray-600 mb-4">
                    The page you are looking for has crawled away, slid down the play slide, or was never here in the first place.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="index.html" class="btn btn-primary btn-lg d-inline-flex align-items-center gap-2">
                        <i class="bi bi-house-door-fill"></i> Go Back Home
                    </a>
                    <a href="contact.html" class="btn btn-outline-primary btn-lg d-inline-flex align-items-center gap-2">
                        <i class="bi bi-envelope-fill"></i> Contact Support
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="site-credit-bar">&copy; 2026 <span class="text-primary">Kids</span> <span class="text-secondary">FunZone</span>. All rights reserved. | Developed and maintained by <a href="https://www.idyllicservices.in/" target="_blank" rel="noopener" class="credit-brand">Idyllic Services Pvt. Ltd.</a></div>

    <button type="button" id="backToTopBtn" class="back-to-top" aria-label="Back to top">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const backToTopBtn = document.getElementById('backToTopBtn');
        window.addEventListener('scroll', () => {
            backToTopBtn.classList.toggle('visible', window.scrollY > 300);
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
